name: Daily Content Recycle

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 18:00 Taipei
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  recycle:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          repository: slashman413/pixabay-shorts-bot
          path: pixabay-shorts-bot
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate recycle content
        run: python scripts/recycle.py

      - name: Deploy schedule page
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      - name: Commit data
        run: |
          git config user.name "Massor"
          git config user.email "slashman413@gmail.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "auto: content recycle update"
          git push

  notify-failure:
    needs: [recycle]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Discord failure alert
        run: >-
          curl -sf -H "Content-Type: application/json"
          -d '{"content": "\ud83d\udd34 ${{ github.repository }} \u2014 ${{ github.workflow }} \u6392\u7a0b\u5931\u6557 \u00b7 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
          "${{ secrets.DISCORD_WEBHOOK }}" || true
