name: Daily Content Recycle

on:
  schedule:
    - cron: "0 10 * * *"   # 10:00 UTC = 18:00 Taipei
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  recycle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: slashman413/pixabay-shorts-bot
          path: pixabay-shorts-bot
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate recycle content
        run: python scripts/recycle.py

      - name: Deploy schedule page
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      - name: Commit data
        run: |
          git config user.name "hermes-agent"
          git config user.email "hermes@nousresearch.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "auto: content recycle update"
          git push
